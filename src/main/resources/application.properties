spring.application.name=nextchapter

spring.datasource.url=jdbc:postgresql://localhost:5432/newchapter_db
spring.datasource.username=newchapter_user
spring.datasource.password=newchapter_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.model=gemini-2.5-flash-lite
spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=15000
spring.ai.retry.backoff.multiplier=2